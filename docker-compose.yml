services:
  app:
    container_name: mygate-pms-container
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  web:
    container_name: mygate-pms-web
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    container_name: mygate-pms-db
    image: mysql:8.0
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pms
    ports:
      - "3307:3306"
    volumes:
      - ./pms_schema.sql:/docker-entrypoint-initdb.d/init.sql
      - dbdata:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  rag-service:
    container_name: rag-service
    build:
      context: ./ai-layer/rag-service
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - qdrant
      - db

volumes:
  dbdata:
  qdrant_data:
